<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 User Login</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style>
        .underline-input {
    border: none;
    border-bottom: 2px solid lightgrey;
    width: 100%;
    margin-bottom: 25px;
}
    </style>
</head>

<body style="background-color: rgb(61, 185, 162);display: flex;align-items: center;justify-content: center;">

    <form method="post" action="" style="padding: 40px;width: 100%;  max-width: 450px; background-color: white; width:50%; margin-top: 5%;">
        <h2 style="text-align: center; padding-top: 20px;">User Login</h2>
        <div class="form-group">
            <label for="username" style="color: rgb(61, 185, 162); font-weight: bold;">Username</label>
            <input type="text" class="underline-input" name="username" id="username"><br>
            <label for="password" style="color: rgb(61, 185, 162); font-weight: bold;">Password</label>
            <input type="password" class="underline-input" name="password" id="password"><br>
            <button type="submit" class="btn"
                style="background-color: rgb(61, 185, 162); color: white;width: 100%;font-size: large; border-radius: 4px;padding: 12px;display: block; margin: 20px auto 10px auto;"><b>LOGIN</b></button>
            <p style="text-align: center;">Forgot Password?</p>
    </form>
    </section>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 Login</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

<body style="background-color: rgb(61, 185, 162);display: flex;align-items: center;justify-content: center;">

    <form method="post" action="" style="padding: 40px;border-radius: 8px;width: 100%;  max-width: 450px; background-color: white; width:50%; margin-top: 5%;">
        <h2 style="text-align: center; padding-top: 20px; color: rgb(61, 185, 162)">Login</h2>
        <div class="form-group">
            <input type="email" class="form-control" name="email" id="email" style="height:50px" placeholder="Email"><br>
            <input type="password" class="form-control" name="password" id="password" style="height:50px" placeholder="Password"><br>
            <input type="checkbox" id="showPassword" name="showPassword">
            <label for="showPassword">Show Password</label><br><br>
            <button type="submit" class="btn"
                style="background-color: rgb(61, 185, 162); color: white;width: 50%;border-radius: 4px;padding: 12px;display: block; margin: 20px auto 10px auto;">Sign
                In</button>
            <p style="text-align: center;">Forgot <a href="#">Username</a>/<a href="#">Password?</a>?</p>
            <p style="text-align: center;">Don't have an account? <a href="#">Sign up</a></p>
    </form>
    </section>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4(2)</title>
    <style>
        label {
            display: block;
            color: #6a7c92;
            font-size: 14px;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e6ed;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }
    </style>
</head>

<body style="background-color: #a2c9fb; display: flex;justify-content: center;align-items: center;">
    <div style="background-color: white;border-radius: 25px;padding: 40px 60px;width: 100%;max-width: 450px;">
        <h1 style="text-align: center;color:grey">CODEWITHRANDOM</h1>
        <p style="text-align: center;color: grey;">Thank you for Being with me</p>
        <form>
            <label for="name">Name</label><br>
            <input type="text" id="name" name="name"><br>
            <label for="email">E-mail</label><br>
            <input type="email" id="email" name="email"><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password"><br>
            <label for="repeatpassword">Repeat Password</label><br>
            <input type="password" id="repeatpassword" name="repeatpassword"><br>
            <div style="text-align: center;">
                <input
                    style="background-color: #4ca1ff;color: white;width: 60%;margin: 30px auto 0 auto;padding: 12px;border: none;border-radius: 12px;font-size: 16px;font-weight: bold;"
                    type="submit" value="Register">
            </div>
        </form>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 Sign up</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

<body style="background-color: rgba(182, 0, 196);display: flex;align-items: center;justify-content: center;">
    <div class="login-card" style="background-color: white;display: flex;align-items: center;border-radius: 20px; width: 100%; height:60%;max-width: 800px; margin-top: 4%;">
    <div style="flex:1">
        <img src="photo.png" 
                 alt="Login photo" 
                 style="width: 100%; max-width: 300px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.05));"></div>
    <div style="flex:1">
    <form method="post" action="" style="padding: 40px;background-color: white; width:100%; margin-top: 5%;">
        <h1 style="text-align: center; padding-top: 20px;">Member Login</h1>
        <div class="form-group">
            <input type="email" style="width: 100%; border: none; background-color: #ebebeb; padding: 15px 20px; border-radius: 30px; font-size: 16px; outline: none;" name="email" id="email" placeholder="Email"><br><br>
            <input type="password" style="width: 100%; border: none; background-color: #ebebeb; padding: 15px 20px; border-radius: 30px; font-size: 16px; outline: none;" name="password" id="password" placeholder="Password"><br>
            </div>
            <button type="submit" class="btn"
                style="background-color: rgba(31, 204, 68); color: white;width: 100%;font-size: large; border-radius: 20px;padding: 12px;display: block; margin: 20px auto 10px auto;"><b>Login</b></button>
            <p style="text-align: center;">Forgot <a href="#" style="color: rgba(31, 204, 68);">Username/</a><a href="#" style="color: rgba(31, 204, 68);">Password?</a></p>
            <p style="text-align: center; "><a href="#" style="color: rgba(31, 204, 68);" >Create your account</a></p>
    </form>
    </div>
</div>
    </section>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 Sign up</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style>
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>

<body style="background-color: rgba(227, 227, 255);display: flex;align-items: center;justify-content: center;">

    <form method="post" action=""
        style="padding: 40px;width: 100%;  max-width: 450px; background-color: rgba(136, 135, 197); width:50%; margin-top: 5%;">
        <h1 style="text-align: center; padding-top: 20px; color: white;">Sign Up</h1>
        <div class="form-group">
            <div style="display: flex;gap: 15px;">
                <input type="text" name="firstname" id="firstname" placeholder="First Name">
                <input type="text" name="lastname" id="lastname" placeholder="Last Name">
            </div>
            <input type="email" name="email" id="email" placeholder="Email"><br>
            <input type="password" name="password" id="password" placeholder="Password"><br>
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password"><br>
            <div style="text-align: center;">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms" style="text-align: center;color: white;">I accept the Terms of Use & Privacy
                    Policy</label><br>
            </div>
            <button type="submit" class="btn"
                style="background-color: grey; color: white;width: 100%;font-size: large; border-radius: 20px;padding: 12px;display: block; margin: 20px auto 10px auto;"><b>Sign
                    Up</b></button>
            <p style="text-align: center; color: white;">Already have an account? <a href="Task 3(2).html"
                    style="color: white;">Login here</a></p>
            <p style="text-align: center; color: white;">copyright © YourCompany.com</p>
    </form>
    </section>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 (2)</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style>
        header {
            background-color: #ffffff;
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items:normal;
            width: 90%;
            max-width: 1200px;
            padding: 15px 30px;
            border-radius: 4px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #555e6d;
            margin: 0;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-nav {
            background: none;
            border: none;
            font-size: 16px;
            padding: 5px 10px;
        }


        section {
            display: flex;
            justify-content: center;
            padding-top: 100px;
        }

        form {
            width: 100%;
            max-width: 320px;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Scratch</h1>
            </div>
            <div class="nav-buttons">
                <button type="button" style="color: #a0a0a0;" class="btn-nav">Signup</button>
                <button type="button" class="btn-nav">Login</button>
            </div>
        </div>
    </header>
    <section>
        <form method="post" action="" style="margin: auto" max-width="320px">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" name="email" id="email"><br>
                <label for="password">Password:</label>
                <input type="password" class="form-control" name="password" id="password"><br>
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 18px;">Login</button>
        </form>
    </section>
</body>

</html>
